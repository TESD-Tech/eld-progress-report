<!DOCTYPE html>
<html>
<head>
  <title>ELD Progress Report</title>
  ~[wc:commonscripts]
  <link href="/images/css/screen.css" rel="stylesheet" media="screen">
</head>
<body>
  ~[wc:guardian_header_css]

  <eld-report portal="guardian"></eld-report>

  <script type="module">
    const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
    const path = isDev ? '/src/Report.svelte' : '/eld-progress-report/report.js?v=~(random16)'
    import(path).catch(e => console.error('ELD load failed:', e))
  </script>

  ~[wc:guardian_footer_css]
</body>
</html>
