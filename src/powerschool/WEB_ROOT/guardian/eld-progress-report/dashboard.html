<!DOCTYPE html>
<html>
<head>
  <title>ELD Progress Report</title>
  ~[wc:commonscripts]
  <link href="/images/css/screen.css" rel="stylesheet" media="screen">
</head>
<body>
  ~[wc:guardian_header_css]

  <eld-progress-report-app portal="guardian" year-id="~(curyearid)"></eld-progress-report-app>

  <script type="module">
    const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
    const path = isDev ? '/src/main.ts' : '/eld-progress-report/app.js?v=~(random16)'
    import(/* @vite-ignore */ path).catch(e => console.error('ELD load failed:', e))
  </script>

  ~[wc:guardian_footer_css]
</body>
</html>
